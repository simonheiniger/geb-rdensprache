<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSGS Übersetzer</title>
    <link rel="stylesheet" href="src/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- TensorFlow.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>DSGS Übersetzer</h1>
            <p>Deutschschweizerische Gebärdensprache in Echtzeit</p>
            <a href="studio.html" style="color: #3b82f6; text-decoration: none; margin-top: 0.5rem; display: inline-block; font-weight: 600;">🧠 KI Trainings-Studio öffnen</a>
        </header>
        
        <main>
            <div class="video-container">
                <video id="webcam" autoplay playsinline></video>
                <canvas id="output_canvas"></canvas>
                <div id="loading" class="overlay">Lade ML Modelle...</div>
                <div id="gesture-output" class="translation-box">Bereit...</div>
            </div>
            
            <div class="controls">
                <button id="webcamButton" class="btn primary" disabled>Kamera aktivieren</button>
            </div>
        </main>
    </div>

    <!-- Main Module -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
